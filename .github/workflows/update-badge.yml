name: Update PyPI Pre-release Badge

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  update-badge:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Get latest PyPI version (including pre-releases)
        id: pypi
        run: |
          VERSION=$(python3 -c "
          import urllib.request, json, re
          def _ver_tuple(v):
              m = re.match(r'(\d+)\.(\d+)\.(\d+)', v)
              return tuple(int(x) for x in m.groups()) if m else (0, 0, 0)
          data = json.loads(urllib.request.urlopen('https://pypi.org/pypi/argo-proxy/json').read())
          print(max(data['releases'], key=_ver_tuple))
          ")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update badge gist
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: c6a14fa27347321adfed1a01964b17c1
          filename: pypi-badge.json
          label: pypi pre-release
          message: ${{ steps.pypi.outputs.version }}
          color: green
