# Core settings
config_version: '3'
user: ''            # your ANL username (required)
host: 0.0.0.0
port: 44497         # or any available port; init generates a random one
verbose: true

# Upstream
#
# argo_base_url controls all upstream endpoint routing.
# All native endpoint URLs are derived from this value:
#   - native_openai_base_url    = {argo_base_url}/v1
#   - native_anthropic_base_url = {argo_base_url}
#
# Available environments:
#   Production : https://apps.inside.anl.gov/argoapi
#   Development: https://apps-dev.inside.anl.gov/argoapi   (default)
#   Test       : https://apps-test.inside.anl.gov/argoapi
#
# Switch with: argo-proxy config env prod|dev|test
argo_base_url: https://apps-dev.inside.anl.gov/argoapi

# Network & validation
connection_test_timeout: 5    # seconds per URL connectivity test at startup
# skip_url_validation: false  # set true for CI/CD or offline environments
resolve_overrides: {}
# DNS resolution overrides (similar to curl --resolve).
# Maps "host:port" to IP address for custom DNS resolution.
# Useful when accessing Argo API through SSH tunnels or port forwarding,
# where the original hostname must be preserved for TLS certificate validation.
# Example:
#   resolve_overrides:
#     "apps-dev.inside.anl.gov:443": "127.0.0.1"

# Image processing
enable_payload_control: false
max_payload_size: 20          # MB (total for all images in a request)
image_timeout: 30             # seconds
concurrent_downloads: 10      # parallel image downloads

# --- Conditional fields (only appear when set to non-default values) ---
#
# use_legacy_argo: true
#   Enable legacy ARGO gateway mode (individual chat/stream/embed endpoints).
#   Only needed for backward compatibility with the old pipeline.
#
# skip_url_validation: true
#   Skip upstream URL connectivity checks at startup.
#
# native_openai_base_url: "https://custom-openai-endpoint/v1"
#   Only persisted when explicitly set AND differs from {argo_base_url}/v1.
#
# native_anthropic_base_url: "https://custom-anthropic-endpoint"
#   Only persisted when explicitly set AND differs from argo_base_url.
