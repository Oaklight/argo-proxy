site_name: Argo Proxy
site_description: A proxy for different LLM models.
site_author: Peng Ding
site_url: https://argo-proxy.readthedocs.io/en/
repo_name: Oaklight/argo-proxy
repo_url: https://github.com/Oaklight/argo-proxy
copyright: Copyright &copy; 2024 Peng Ding

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.tabs.link

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_toc_entry: false
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - footnotes
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Oaklight/argo-proxy
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh-cn/
      lang: zh

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Usage:
      - usage/index.md
      - Installation: usage/installation.md
      - Running: usage/running.md
      - Endpoints: usage/endpoints.md
      - Models: usage/models.md
      - "Native OpenAI Passthrough": usage/native-openai-passthrough.md
      - "Native Anthropic Passthrough": usage/native-anthropic-passthrough.md
      - Basics:
          - usage/basics/index.md
          - "CLI": usage/basics/cli.md
          - "Configuration": usage/basics/configuration.md
          - "Network": usage/basics/network.md
          - "Timeout Examples": usage/basics/timeout_examples.md
      - Advanced:
          - usage/advanced/index.md
          - "DNS Resolution Overrides": usage/advanced/dns-resolution.md
          - "Streaming": usage/advanced/streaming.md
          - "Vision": usage/advanced/vision.md
          - Tools:
              - usage/advanced/tools/index.md
              - "Getting Started": usage/advanced/tools/getting-started.md
              - "Advanced Usage": usage/advanced/tools/advanced-usage.md
              - "OpenAI Parameters": usage/advanced/tools/openai-parameters.md
              - "ToolRegistry": usage/advanced/tools/toolregistry.md
  - Examples:
      - examples/index.md
  - Changelog: changelog.md
